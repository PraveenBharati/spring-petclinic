---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  labels:
    app: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      # Pull image from AWS ECR using the secret
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: workload
          image: 004754164629.dkr.ecr.us-east-1.amazonaws.com/petclinic-ui:14
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://demo-db:5432/petclinic
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: create
            - name: SPRING_DATASOURCE_USERNAME
              value: user
            - name: SPRING_DATASOURCE_PASSWORD
              value: pass
            - name: SPRING_SQL_INIT_MODE
              value: always
            - name: SPRING_PROFILES_ACTIVE
              value: postgres
            - name: SPRING_APPLICATION_JSON
              value: |
                {
                  "management.endpoint.health.probes.add-additional-paths": true
                }
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
              initialDelaySeconds: 60
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
              initialDelaySeconds: 30
          volumeMounts:
            - mountPath: /bindings/secret
              name: binding
              readOnly: true
      volumes:
        - name: binding
          projected:
            sources:
              - secret:
                  name: demo-db
